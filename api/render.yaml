services:
  # ── Web Service (ocr-api) ────────────────────────────────────────────────────
  - type: web
    name: ocr-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: ocr-web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: cardscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cardscan-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SFTP_HOST
        sync: false
      - key: SFTP_USER
        sync: false
      - key: SFTP_PRIVATE_KEY
        sync: false
      - key: SFTP_UPLOAD_DIR
        value: /uploads/crm
      - key: OPENAI_API_KEY
        sync: false

  # ── Background Worker (ocr-export-worker) ────────────────────────────────────
  - type: worker
    name: ocr-export-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cardscan-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: cardscan-redis
          property: connectionString
      - key: SFTP_HOST
        sync: false
      - key: SFTP_USER
        sync: false
      - key: SFTP_PRIVATE_KEY
        sync: false
      - key: SFTP_UPLOAD_DIR
        value: /uploads/crm

databases:
  - name: cardscan-db
    plan: starter

  - name: cardscan-redis
    type: redis
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (restrict in production)
